[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && python -m backend.rebuild_db"

[deploy]
startCommand = "uvicorn backend.app:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[build.nixpacks]
pythonVersion = "3.11"
