services:
  - type: web
    name: subsidiary-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m backend.rebuild_db
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
